<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="BindX — The Complete In Silico Drug Discovery Platform. Docking, ADMET, safety, retrosynthesis, AI generation in one place." />
    <title>BindX — In Silico Drug Discovery Platform</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Literata:ital,opsz,wght@0,7..72,300;0,7..72,400;0,7..72,700;1,7..72,300;1,7..72,400&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <!-- GitHub Pages SPA: restore route from 404.html redirect -->
    <script>
      (function(){
        var redir = sessionStorage.redirect;
        delete sessionStorage.redirect;
        if (redir && redir !== location.href) {
          history.replaceState(null, null, redir);
        }
      })();
      // Capture redirect from 404.html query string
      (function(){
        var q = window.location.search;
        if (q && q[1] === '/') {
          var decoded = q.slice(1).split('&').map(function(s){return s.replace(/~and~/g,'&')}).join('?');
          window.history.replaceState(null, null,
            window.location.pathname.slice(0, -1) + decoded + window.location.hash
          );
        }
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
