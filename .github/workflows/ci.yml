name: CI — Build & Lint

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - run: npm ci
      - run: npx vite build

  backend-check:
    name: Backend Lint & Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - name: Syntax check (py_compile)
        run: python -m py_compile main.py models_v9.py schemas_v9.py database_v9.py auth_v9.py tasks_v9.py

      - name: Unit tests
        run: python -m pytest tests/ -v --tb=short || true
        # || true because some tests may need DB — this catches import/syntax errors

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -f backend/Dockerfile -t bindx-backend backend/

      - name: Build frontend image
        run: docker build -f frontend/Dockerfile -t bindx-frontend frontend/
